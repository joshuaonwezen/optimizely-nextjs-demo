name: Seed GA4

on:
  schedule:
    - cron: "17 6 * * *" # ~06:17 UTC daily
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Send a day of fake traffic to GA4
        run: npm run ga4:seed -- --window=24 --users=2026
        env:
          GA4_MEASUREMENT_ID: G-EKYQLXD2VB
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
